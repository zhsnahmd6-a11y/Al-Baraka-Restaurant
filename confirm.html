<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تأكيد طلبك - مطعم البركة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #9B1515 0%, #CC1F1F 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 28px;
    width: 100%;
    max-width: 460px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    padding: 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }

  .check-icon {
    font-size: 72px;
    display: block;
    margin-bottom: 12px;
    animation: bounce 0.6s ease 0.3s both;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .header h1 {
    font-size: 26px;
    font-weight: 900;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header p {
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    margin-top: 6px;
  }

  /* BODY */
  .body { padding: 28px 24px; }

  /* CUSTOMER NAME */
  .customer-greeting {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    color: #CC1F1F;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px dashed #f0d0c0;
  }

  /* INFO ROWS */
  .info-section {
    background: #f9f9f9;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .info-section-title {
    background: #CC1F1F;
    color: white;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-row:last-child { border-bottom: none; }

  .info-label {
    font-size: 13px;
    color: #888;
    font-weight: 600;
  }

  .info-value {
    font-size: 15px;
    font-weight: 800;
    color: #222;
    text-align: left;
  }

  /* DELIVERY BOX */
  .delivery-box {
    background: linear-gradient(135deg, #fff8ee, #fff3e0);
    border: 2px solid #D4A017;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }

  .delivery-title {
    font-size: 13px;
    color: #888;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .delivery-icon { font-size: 40px; display: block; margin-bottom: 8px; }

  .delivery-name {
    font-size: 22px;
    font-weight: 900;
    color: #CC1F1F;
    margin-bottom: 6px;
  }

  .delivery-phone {
    font-size: 20px;
    font-weight: 800;
    color: #333;
    letter-spacing: 1px;
    direction: ltr;
    display: block;
  }

  .call-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #27ae60;
    color: white;
    border-radius: 12px;
    padding: 12px;
    margin-top: 14px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    transition: background 0.2s;
  }

  .call-btn:hover { background: #219a52; }

  /* STATUS */
  .status-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 24px;
    position: relative;
  }

  .status-bar::before {
    content: '';
    position: absolute;
    top: 20px;
    right: 10%;
    left: 10%;
    height: 3px;
    background: #eee;
    z-index: 0;
  }

  .status-bar::after {
    content: '';
    position: absolute;
    top: 20px;
    right: 10%;
    width: 80%;
    height: 3px;
    background: linear-gradient(to left, #27ae60, #CC1F1F);
    z-index: 1;
    animation: progressLine 1s ease 0.5s both;
    transform-origin: right;
  }

  @keyframes progressLine {
    from { width: 0; }
    to { width: 80%; }
  }

  .status-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 2;
    flex: 1;
  }

  .step-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: #eee;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .step-circle.done { background: #27ae60; }
  .step-circle.active { background: #CC1F1F; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(204,31,31,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(204,31,31,0); }
  }

  .step-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-align: center;
  }

  .step-label.done { color: #27ae60; }
  .step-label.active { color: #CC1F1F; }

  /* FOOTER */
  .footer-card {
    background: #f5f5f5;
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-top: 8px;
  }

  .footer-card a {
    color: #CC1F1F;
    font-weight: 700;
    text-decoration: none;
  }

  /* RESTAURANT LOGO */
  .restaurant-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    border-top: 1px solid #f0f0f0;
    margin-top: 16px;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 900;
    color: #CC1F1F;
  }

  .brand-sub {
    font-size: 12px;
    color: #888;
    font-weight: 600;
  }

  /* RESPONSIVE */
  @media (max-width: 400px) {
    .header h1 { font-size: 22px; }
    .delivery-name { font-size: 18px; }
    .step-label { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="header">
    <span class="check-icon">✅</span>
    <h1>تم تأكيد طلبك!</h1>
    <p>مطعم البركة - فرع النزهة 🍽️</p>
  </div>

  <div class="body">

    <!-- CUSTOMER GREETING -->
    <div class="customer-greeting" id="customerGreeting">
      أهلاً يا <span id="customerName">عزيزنا</span>! 👋
    </div>

    <!-- ORDER STATUS -->
    <div class="status-bar">
      <div class="status-step">
        <div class="step-circle done">✓</div>
        <span class="step-label done">تم الطلب</span>
      </div>
      <div class="status-step">
        <div class="step-circle done">✓</div>
        <span class="step-label done">تم التأكيد</span>
      </div>
      <div class="status-step">
        <div class="step-circle active">🍳</div>
        <span class="step-label active">جاري التجهيز</span>
      </div>
      <div class="status-step">
        <div class="step-circle">🛵</div>
        <span class="step-label">في الطريق</span>
      </div>
    </div>

    <!-- ORDER INFO -->
    <div class="info-section">
      <div class="info-section-title">📋 تفاصيل الطلب</div>
      <div class="info-row">
        <span class="info-label">رقم الطلب</span>
        <span class="info-value" id="orderId">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">وقت الطلب</span>
        <span class="info-value" id="orderTime">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">طريقة الدفع</span>
        <span class="info-value" id="payMethod">-</span>
      </div>
      <div class="info-row" id="totalRow">
        <span class="info-label">الإجمالي</span>
        <span class="info-value" id="orderTotal" style="color:#CC1F1F;">-</span>
      </div>
    </div>

    <!-- DELIVERY INFO -->
    <div class="delivery-box" id="deliveryBox">
      <div class="delivery-title">🛵 معلومات الدليفري</div>
      <span class="delivery-icon">🧑‍🦱</span>
      <div class="delivery-name" id="deliveryName">-</div>
      <span class="delivery-phone" id="deliveryPhone">-</span>
      <a class="call-btn" id="callDeliveryBtn" href="#">
        📞 اتصل بالدليفري
      </a>
    </div>

    <!-- FOOTER -->
    <div class="footer-card">
      📞 للاستفسار: <a href="tel:01001803423">01001803423</a>
      &nbsp;|&nbsp;
      <a href="tel:01113179539">01113179539</a>
    </div>

    <div class="restaurant-brand">
      <div>
        <div class="brand-name">البركة</div>
        <div class="brand-sub">فول وفلافل • فرع النزهة</div>
      </div>
    </div>

  </div>
</div>

<script>
// قراءة البيانات من الرابط
const params = new URLSearchParams(window.location.search);

const customerName = params.get('name') || 'عزيزنا';
const deliveryName = params.get('delivery') || '';
const deliveryPhone = params.get('dphone') || '';
const orderId = params.get('oid') || '#' + Math.floor(Math.random()*9000+1000);
const orderTime = params.get('time') || new Date().toLocaleString('ar-EG', {hour:'2-digit', minute:'2-digit'});
const payMethod = params.get('pay') === 'vodafone' ? '📱 فودافون كاش' : '💵 كاش عند الاستلام';
const orderTotal = params.get('total') || '';

// تعبئة البيانات
document.getElementById('customerName').textContent = customerName;
document.getElementById('orderId').textContent = orderId;
document.getElementById('orderTime').textContent = orderTime;
document.getElementById('payMethod').textContent = payMethod;

if (orderTotal) {
  document.getElementById('orderTotal').textContent = orderTotal + ' جنيه';
} else {
  document.getElementById('totalRow').style.display = 'none';
}

if (deliveryName) {
  document.getElementById('deliveryName').textContent = deliveryName;
} else {
  document.getElementById('deliveryName').textContent = 'جاري التعيين...';
}

if (deliveryPhone) {
  document.getElementById('deliveryPhone').textContent = deliveryPhone;
  document.getElementById('callDeliveryBtn').href = `tel:${deliveryPhone}`;
} else {
  document.getElementById('deliveryPhone').textContent = 'سيتم إرساله قريباً';
  document.getElementById('callDeliveryBtn').style.display = 'none';
}
</script>

</body>
</html>
